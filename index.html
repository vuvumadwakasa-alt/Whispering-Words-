                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function doTranslate(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const lang=document.getElementById('langSelect').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const text=encodeURIComponent(e.innerText);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.open(`https://translate.google.com/?sl=en&tl=${lang}&text=${text}&op=translate`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          closeModal('translateModal');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function showAIHelp(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const tips={
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                screenplay:`<b>Screenplay Rules:</b><br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    1. <b>INT/EXT</b> = Location. Ex: INT. BETHANI - DAY<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        2. <b>ACTION</b> = What we see. Write in present tense.<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            3. <b>CHARACTER</b> = Always centered, UPPERCASE<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                4. <b>DIALOGUE</b> = Under character, indented<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    5. <b>()</b> = Actor direction, centered<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        6. 1 page ≈ 1 minute of screen time<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            7. <b>(CONT'D)</b> appears auto when dialogue splits across pages`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                theatre:`<b>Theatre Rules:</b><br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    1. <b>SCENE</b> = Underlined<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        2. <b>STAGE DIR</b> = Italic, describes action<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            3. <b>CHARACTER</b> = Left, UPPERCASE<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                4. No page limits like film`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    radio:`<b>Radio Rules:</b><br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        1. <b>SFX</b> = Sound effects. Ex: SFX: DOOR SLAM<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            2. <b>MUSIC</b> = Music cues<br>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                3. Everything is heard, not seen`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('aiTips').innerHTML=tips[currentMode];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('aiModal').style.display='block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function closeModal(id){document.getElementById(id).style.display='none'}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      e.addEventListener('input',()=>{checkPageBreak();saveScript()});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      setInterval(saveScript,5000);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // SCROLL TOOLBAR INTO VIEW WHEN KEYBOARD OPENS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      e.addEventListener('focus',()=>{setTimeout(()=>keyboardBar.scrollIntoView({behavior:'smooth',block:'end'}),300)});
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
