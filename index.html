<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Whispering Words</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
header{background:#8B4513;color:#fff;padding:10px;text-align:center;font-weight:bold;flex-shrink:0;position:relative}
#save{position:absolute;top:8px;right:8px;background:#2e7d32;color:#fff;border:none;padding:6px 12px;border-radius:4px}

/* STICKY KEYBOARD TOOLBAR - stays above keyboard */
.keyboard-bar{position:sticky;bottom:0;z-index:100;background:#fff;border-top:2px solid #8B4513;padding:8px;display:flex;flex-wrap:wrap;gap:6px}
.keyboard-bar button{padding:10px 12px;background:#8B4513;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:bold;flex:1;min-width:70px}

/* EDITOR */
#editor{flex:1;padding:16px;background:#fff;font-size:16px;line-height:1.2;overflow-y:auto;outline:none}
#editor div{min-height:20px}

/* SCREENPLAY FORMAT - MOBILE FIXED */
.screenplay.scene{margin:0 0 16px 0;text-transform:uppercase;font-weight:bold}
.screenplay.action{margin:0 0 16px 0}
.screenplay.character{text-align:center!important;text-transform:uppercase;font-weight:bold;margin:16px 0 0 0;width:100%!important}
.screenplay.dialogue{margin:0 10% 16px 10%;width:80%}
.screenplay.paren{text-align:center!important;margin:0 0 0 0;width:100%!important}
.screenplay.transition{text-align:right!important;text-transform:uppercase;font-weight:bold;margin:16px 0 16px 0}

/* PAGE BREAKS + NUMBERS */
.page{page-break-after:always;border-bottom:1px dashed #ccc;padding-bottom:40px;margin-bottom:40px;position:relative}
.page-number{position:absolute;top:10px;right:20px;font-size:12px}
.contd{position:absolute;top:10px;right:50%;transform:translateX(50%);font-size:12px}

/* Theatre + Radio - already working */
.theatre.scene{font-weight:bold;text-decoration:underline;margin:16px 0}
.theatre.action{font-style:italic;margin:0 0 16px 0}
.theatre.character{font-weight:bold;text-transform:uppercase;margin:16px 0 0 0}
.theatre.dialogue{margin-left:5%;margin-bottom:16px}
.theatre.paren{margin-left:5%;font-style:italic}
.radio.scene{font-weight:bold;margin:16px 0}
.radio.action{font-style:italic;margin:0 0 16px 0}
.radio.character{font-weight:bold;text-transform:uppercase;margin:16px 0 0 0}
.radio.dialogue{margin:0 0 16px 0}
.radio.sfx{font-weight:bold;text-transform:uppercase}
.radio.music{font-weight:bold;text-transform:uppercase}

/* BOTTOM TOOLBAR */
.bottom-bar{background:#fff;border-top:1px solid #ddd;flex-shrink:0}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px}
.toolbar button,.toolbar select{padding:8px 10px;background:#333;color:#fff;border:none;border-radius:4px;font-size:12px}
footer{text-align:center;padding:6px;font-size:10px;color:#666;background:#eee}

/* MODALS */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:300}
.modal-content{background:#fff;margin:5% auto;padding:20px;width:90%;max-width:500px;border-radius:8px;max-height:80vh;overflow-y:auto}
.modal textarea{width:100%;height:150px;margin:10px 0;font-family:'Courier New'}
.modal input[type=file]{margin:10px 0}
</style>
</head>
<body>
<header>The Whispering Words <button id="save" onclick="saveScript()">Save</button></header>

<div id="editor" contenteditable="true" class="screenplay"></div>

<!-- KEYBOARD TOOLBAR - STICKS ABOVE KEYBOARD -->
<div class="keyboard-bar" id="keyboardBar"></div>

<div class="bottom-bar">
  <div class="toolbar">
      <select id="modeSelect" onchange="setMode(this.value)">
            <option value="screenplay">Screenplay</option>
                  <option value="theatre">Theatre</option>
                        <option value="radio">Radio</option>
                            </select>
                                <button onclick="showImport()">Import</button>
                                    <button onclick="showLibrary()">Library</button>
                                        <button onclick="share()">Share</button>
                                            <button onclick="exportPDF()">PDF</button>
                                                <button onclick="exportTXT()">TXT</button>
                                                    <button onclick="showTranslate()">Translate</button>
                                                        <button onclick="showAIHelp()">AI Help</button>
                                                          </div>
                                                            <footer>2026 Built by Vuyisani Madwakasa for SA Creatives</footer>
                                                            </div>

                                                            <!-- Import Modal - NOW WITH FILE PICKER -->
                                                            <div id="importModal" class="modal">
                                                              <div class="modal-content">
                                                                  <h3>Import Script</h3>
                                                                      <p>Choose a.txt or.fdx file from your phone:</p>
                                                                          <input type="file" id="fileInput" accept=".txt,.fdx,.fountain">
                                                                              <p>Or paste text below:</p>
                                                                                  <textarea id="importText"></textarea>
                                                                                      <button onclick="doImport()">Import</button>
                                                                                          <button onclick="closeModal('importModal')">Cancel</button>
                                                                                            </div>
                                                                                            </div>

                                                                                            <!-- AI Help Modal - NOW USEFUL -->
                                                                                            <div id="aiModal" class="modal">
                                                                                              <div class="modal-content">
                                                                                                  <h3>AI Help for SA Creatives</h3>
                                                                                                      <div id="aiTips"></div>
                                                                                                          <button onclick="closeModal('aiModal')">Close</button>
                                                                                                            </div>
                                                                                                            </div>

                                                                                                            <!-- Translate Modal -->
                                                                                                            <div id="translateModal" class="modal">
                                                                                                              <div class="modal-content">
                                                                                                                  <h3>Translate Script</h3>
                                                                                                                      <select id="langSelect">
                                                                                                                            <option value="zu">isiZulu</option>
                                                                                                                                  <option value="xh">isiXhosa</option>
                                                                                                                                        <option value="st">Sesotho</option>
                                                                                                                                              <option value="tn">Setswana</option>
                                                                                                                                                    <option value="af">Afrikaans</option>
                                                                                                                                                        </select>
                                                                                                                                                            <button onclick="doTranslate()">Open in Google Translate</button>
                                                                                                                                                                <button onclick="closeModal('translateModal')">Cancel</button>
                                                                                                                                                                  </div>
                                                                                                                                                                  </div>

                                                                                                                                                                  <script>
                                                                                                                                                                  const e=document.getElementById('editor');
                                                                                                                                                                  const modeSelect=document.getElementById('modeSelect');
                                                                                                                                                                  const keyboardBar=document.getElementById('keyboardBar');
                                                                                                                                                                  let currentMode='screenplay';
                                                                                                                                                                  let pageCount=1;

                                                                                                                                                                  // LOAD + PAGE NUMBERS
                                                                                                                                                                  function loadScript(){
                                                                                                                                                                    e.innerHTML=localStorage.getItem('script')||'<div class="page" data-page="1"><div class="action"><br></div></div>';
                                                                                                                                                                      setMode(localStorage.getItem('mode')||'screenplay');
                                                                                                                                                                        updatePageNumbers();
                                                                                                                                                                        }
                                                                                                                                                                        loadScript();

                                                                                                                                                                        function saveScript(){
                                                                                                                                                                          localStorage.setItem('script',e.innerHTML);
                                                                                                                                                                            localStorage.setItem('mode',currentMode);
                                                                                                                                                                            }

                                                                                                                                                                            function setMode(mode){
                                                                                                                                                                              currentMode=mode;
                                                                                                                                                                                e.className=mode;
                                                                                                                                                                                  modeSelect.value=mode;
                                                                                                                                                                                    updateKeyboardButtons();
                                                                                                                                                                                      saveScript();
                                                                                                                                                                                      }

                                                                                                                                                                                      function updateKeyboardButtons(){
                                                                                                                                                                                        if(currentMode==='screenplay'){
                                                                                                                                                                                            keyboardBar.innerHTML=`
                                                                                                                                                                                                  <button onclick="addScene()">INT/EXT</button>
                                                                                                                                                                                                        <button onclick="addAction()">ACTION</button>
                                                                                                                                                                                                              <button onclick="addCharacter()">CHARACTER</button>
                                                                                                                                                                                                                    <button onclick="addDialogue()">DIALOGUE</button>
                                                                                                                                                                                                                          <button onclick="addParen()">()</button>
                                                                                                                                                                                                                                <button onclick="addTransition()">TRANSITION</button>
                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                      }else if(currentMode==='theatre'){
                                                                                                                                                                                                                                          keyboardBar.innerHTML=`
                                                                                                                                                                                                                                                <button onclick="addScene()">SCENE</button>
                                                                                                                                                                                                                                                      <button onclick="addAction()">STAGE DIR</button>
                                                                                                                                                                                                                                                            <button onclick="addCharacter()">CHARACTER</button>
                                                                                                                                                                                                                                                                  <button onclick="addDialogue()">DIALOGUE</button>
                                                                                                                                                                                                                                                                        <button onclick="addParen()">()</button>
                                                                                                                                                                                                                                                                            `;
                                                                                                                                                                                                                                                                              }else if(currentMode==='radio'){
                                                                                                                                                                                                                                                                                  keyboardBar.innerHTML=`
                                                                                                                                                                                                                                                                                        <button onclick="addScene()">SCENE</button>
                                                                                                                                                                                                                                                                                              <button onclick="addAction()">DIRECTION</button>
                                                                                                                                                                                                                                                                                                    <button onclick="addCharacter()">CHARACTER</button>
                                                                                                                                                                                                                                                                                                          <button onclick="addDialogue()">DIALOGUE</button>
                                                                                                                                                                                                                                                                                                                <button onclick="addSFX()">SFX</button>
                                                                                                                                                                                                                                                                                                                      <button onclick="addMusic()">MUSIC</button>
                                                                                                                                                                                                                                                                                                                          `;
                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                            // FORMATTING FUNCTIONS - CHARACTER FIXED WITH!IMPORTANT
                                                                                                                                                                                                                                                                                                                            function addLine(className, text){
                                                                                                                                                                                                                                                                                                                              const div=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                div.className=className;
                                                                                                                                                                                                                                                                                                                                  div.innerHTML=text || '<br>';
                                                                                                                                                                                                                                                                                                                                    getCurrentPage().appendChild(div);
                                                                                                                                                                                                                                                                                                                                      placeCursor(div);
                                                                                                                                                                                                                                                                                                                                        checkPageBreak();
                                                                                                                                                                                                                                                                                                                                          saveScript();
                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                          function getCurrentPage(){
                                                                                                                                                                                                                                                                                                                                            let pages=e.querySelectorAll('.page');
                                                                                                                                                                                                                                                                                                                                              if(pages.length===0){
                                                                                                                                                                                                                                                                                                                                                  const page=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                      page.className='page';
                                                                                                                                                                                                                                                                                                                                                          page.setAttribute('data-page','1');
                                                                                                                                                                                                                                                                                                                                                              e.appendChild(page);
                                                                                                                                                                                                                                                                                                                                                                  return page;
                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                      return pages[pages.length-1];
                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                      function placeCursor(el){
                                                                                                                                                                                                                                                                                                                                                                        const range=document.createRange();
                                                                                                                                                                                                                                                                                                                                                                          const sel=window.getSelection();
                                                                                                                                                                                                                                                                                                                                                                            range.selectNodeContents(el);
                                                                                                                                                                                                                                                                                                                                                                              range.collapse(false);
                                                                                                                                                                                                                                                                                                                                                                                sel.removeAllRanges();
                                                                                                                                                                                                                                                                                                                                                                                  sel.addRange(range);
                                                                                                                                                                                                                                                                                                                                                                                    e.focus();
                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                    function addScene(){
                                                                                                                                                                                                                                                                                                                                                                                      if(currentMode==='screenplay') addLine('scene','INT. ');
                                                                                                                                                                                                                                                                                                                                                                                        else addLine('scene','SCENE: ');
                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                        function addAction(){addLine('action','')}
                                                                                                                                                                                                                                                                                                                                                                                        function addCharacter(){addLine('character','')}
                                                                                                                                                                                                                                                                                                                                                                                        function addDialogue(){addLine('dialogue','')}
                                                                                                                                                                                                                                                                                                                                                                                        function addParen(){addLine('paren','()')}
                                                                                                                                                                                                                                                                                                                                                                                        function addTransition(){addLine('transition','FADE OUT:')}
                                                                                                                                                                                                                                                                                                                                                                                        function addSFX(){addLine('sfx','SFX: ')}
                                                                                                                                                                                                                                                                                                                                                                                        function addMusic(){addLine('music','MUSIC: ')}

                                                                                                                                                                                                                                                                                                                                                                                        // PAGE BREAKS + (CONT'D) LOGIC
                                                                                                                                                                                                                                                                                                                                                                                        function checkPageBreak(){
                                                                                                                                                                                                                                                                                                                                                                                          const pageHeight=1100; // ~55 lines
                                                                                                                                                                                                                                                                                                                                                                                            const currentPage=getCurrentPage();
                                                                                                                                                                                                                                                                                                                                                                                              if(currentPage.offsetHeight > pageHeight){
                                                                                                                                                                                                                                                                                                                                                                                                  const newPage=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                      pageCount++;
                                                                                                                                                                                                                                                                                                                                                                                                          newPage.className='page';
                                                                                                                                                                                                                                                                                                                                                                                                              newPage.setAttribute('data-page',pageCount);
                                                                                                                                                                                                                                                                                                                                                                                                                  newPage.innerHTML='<div class="contd">(CONT\'D)</div>';
                                                                                                                                                                                                                                                                                                                                                                                                                      e.appendChild(newPage);
                                                                                                                                                                                                                                                                                                                                                                                                                          updatePageNumbers();
                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                            function updatePageNumbers(){
                                                                                                                                                                                                                                                                                                                                                                                                                              document.querySelectorAll('.page').forEach((page,i)=>{
                                                                                                                                                                                                                                                                                                                                                                                                                                  let num=page.querySelector('.page-number');
                                                                                                                                                                                                                                                                                                                                                                                                                                      if(!num){
                                                                                                                                                                                                                                                                                                                                                                                                                                            num=document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                  num.className='page-number';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        page.appendChild(num);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                num.textContent=i+1+'.';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // SMART ENTER KEY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  e.addEventListener('keydown',function(ev){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(ev.key==='Enter'){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ev.preventDefault();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const sel=window.getSelection();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const node=sel.anchorNode.parentElement;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(node.classList.contains('character')||node.classList.contains('paren')){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addDialogue();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }else{
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    addAction();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          // WORKING BUTTONS
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function showImport(){document.getElementById('importModal').style.display='block'}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function doImport(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const fileInput=document.getElementById('fileInput');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const textInput=document.getElementById('importText');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(fileInput.files.length>0){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const reader=new FileReader();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        reader.onload=function(ev){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              e.innerHTML='<div class="page" data-page="1"><div class="action">'+ev.target.result.replace(/\n/g,'</div><div class="action">')+'</div></div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    closeModal('importModal');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          updatePageNumbers();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                saveScript();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        reader.readAsText(fileInput.files[0]);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }else if(textInput.value){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              e.innerHTML='<div class="page" data-page="1"><div class="action">'+textInput.value.replace(/\n/g,'</div><div class="action">')+'</div></div>';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  closeModal('importModal');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      updatePageNumbers();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          saveScript();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function showLibrary(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              alert('Library: Your script auto-saves every 5 seconds. Close and reopen the app to see it. Future update: Multiple scripts.');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function share(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const text=e.innerText;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(navigator.share){navigator.share({title:'My Script - The Whispering Words',text:text})}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    else{navigator.clipboard.writeText(text);alert('Script copied to clipboard!')}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function exportPDF(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const w=window.open();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        w.document.write('<html><head><title>Script</title><style>@page{margin:1in 1in 1in 1.5in}body{font-family:Courier;font-size:12pt;line-height:1}'+document.querySelector('style').innerHTML+'</style></head><body class="'+currentMode+'">'+e.innerHTML+'</body></html>');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          setTimeout(()=>w.print(),500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function exportTXT(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const a=document.createElement('a');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              a.href='data:text/plain,'+encodeURIComponent(e.innerText);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                a.download='WhisperingWords-'+currentMode+'-script.txt';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  a.click();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function showTranslate(){document.getElementById('translateModal').style.display='block'}
