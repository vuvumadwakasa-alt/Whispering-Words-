<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Whispering Words</title>
<style>
body{margin:0;font-family:Courier,monospace;background:#f5f5f5}
header{background:#8B4513;color:#fff;padding:12px;text-align:center;font-weight:bold}
.quick-buttons{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:#fff;border-bottom:2px solid #8B4513}
.quick-buttons button{padding:8px 10px;background:#8B4513;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:bold}
#editor{width:100%;height:55vh;padding:16px;border:none;font-size:16px;line-height:1.5;box-sizing:border-box}
.toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:#fff;border-top:1px solid #ddd}
.toolbar button,.toolbar select{padding:8px 10px;background:#333;color:#fff;border:none;border-radius:4px;font-size:12px}
#save{position:fixed;top:8px;right:8px;background:#2e7d32}
footer{text-align:center;padding:8px;font-size:10px;color:#666}
</style>
</head>
<body>
<header>The Whispering Words</header>
<button id="save" onclick="saveScript()">Save</button>

<!-- NEW: Simple tap buttons for beginners -->
<div class="quick-buttons">
<button onclick="add('INT. ')">INT/EXT</button>
<button onclick="add('')">ACTION</button>
<button onclick="add('')">CHARACTER</button>
<button onclick="add('()')">()</button>
<button onclick="add('FADE OUT.')">TRANSITION</button>
</div>

<textarea id="editor" placeholder="Tap a button above to start, or start typing..."></textarea>

<!-- Your existing pro toolbar -->
<div class="toolbar">
<select onchange="setMode(this.value)">
<option value="screenplay">Screenplay</option>
<option value="theatre">Theatre</option>
<option value="radio">Radio</option>
</select>
<button onclick="importFile()">Import</button>
<button onclick="showLibrary()">Library</button>
<button onclick="share()">Share</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="exportTXT()">TXT</button>
<button onclick="translate()">Translate</button>
<button onclick="aiHelp()">AI Help</button>
</div>

<footer>2026 Built by Vuyisani Madwakasa for SA Creatives</footer>

<script>
const e=document.getElementById('editor');
e.value=localStorage.getItem('script')||'';

function add(t){e.value+=t;e.focus();saveScript()}
function saveScript(){localStorage.setItem('script',e.value)}
function setMode(m){alert('Mode: '+m+' — formatting coming soon')}
function importFile(){alert('Import: Paste your script into the editor')}
function showLibrary(){alert('Library: All saves are automatic')}
function share(){navigator.share?navigator.share({text:e.value}):alert('Copied!');navigator.clipboard.writeText(e.value)}
function exportPDF(){const w=window.open();w.document.write('<pre style="font-family:Courier;font-size:12pt">'+e.value+'</pre>');w.print()}
function exportTXT(){const a=document.createElement('a');a.href='data:text/plain,'+encodeURIComponent(e.value);a.download='script.txt';a.click()}
function translate(){alert('Translate: Coming soon for SA languages')}
function aiHelp(){alert('AI Help: Ask me anything about your script')}
</script>
</body>
</html>
